<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Amazon SMT Music Companion</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body class="smt-hud themed">
    <div class="hud-container">
        <!-- HEADER / STATUS SECTION -->
        <header>
            <div class="hud-header">
                <div class="status-indicator">
                    <img src="../assets/press-turn.png" id="status-icon" alt="Status">
                </div>
                <div class="title-section">
                    <h1 class="glitch-text" data-text="AMAZON SMT MUSIC COMPANION">AMAZON SMT MUSIC COMPANION</h1>
                </div>
            </div>
            <div style="padding-top: 5px;" id="market-status" class="connection-status">INITIALIZING...</div>
        </header>

        <!-- MAIN PLAYER CORE -->
        <main class="player-core">
            <div class="track-info">
                <label class="hud-label">SONG SELECT</label>
                <div class="select-wrapper">
                    <select id="track-select">
                        <!-- Dynamically populated -->
                    </select>
                </div>
            </div>

            <div class="progress-section">
                <div class="bar-container">
                    <div class="bar-decoration left"></div>
                    <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1">
                    <div class="bar-decoration right"></div>
                </div>
                <div id="time-display" class="track-time">0:00 / 0:00</div>
            </div>
        </main>

        <!-- CONTROL DASHBOARD -->
        <section class="control-dashboard">
            <div class="primary-controls">
                <button id="toggle-btn" class="glow-btn" title="Toggle Power">
                    <!-- Icon inserted by JS -->
                </button>
                <div class="aux-controls">
                    <button id="restart-btn" class="icon-btn" title="Restart Track">RESTART</button>
                    <button id="random-btn" class="icon-btn" title="Random Track">RANDOM</button>
                    <button id="repeat-btn" class="icon-btn" title="Loop Mode">REPEAT</button>
                </div>
            </div>

            <div class="mixer-settings">
                <div class="mixer-row">
                    <label class="hud-label">VOLUME</label>
                    <div class="slider-wrapper">
                        <input type="range" id="volume-slider" min="0" max="100" value="50">
                    </div>
                </div>

            </div>
        </section>

        <footer class="hud-footer">
            <p class="version">V5.0.0</p>
        </footer>
    </div>

    <script src="../config.js"></script>
    <script src="popup.js"></script>
</body>

</html>
